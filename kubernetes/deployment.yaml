---
# ============================================
# DEPLOYMENT INSTRUCTIONS
# ============================================
#
# 1. Create namespace (optional)
#    kubectl create namespace ai-employee
#
# 2. Create secrets
#    kubectl create secret generic ai-employee-secrets \\
#      --from-literal=GMAIL_CLIENT_ID=your_client_id \\
#      --from-literal=GMAIL_CLIENT_SECRET=your_client_secret \\
#      --from-literal=ODOO_API_KEY=your_api_key \\
#      -n ai-employee
#
# 3. Apply deployment
#    kubectl apply -f deployment.yaml -n ai-employee
#
# 4. Check status
#    kubectl get pods -n ai-employee
#    kubectl get deployments -n ai-employee
#    kubectl get services -n ai-employee
#
# 5. View logs
#    kubectl logs -f deployment/cloud-orchestrator -n ai-employee
#
# 6. Scale manually
#    kubectl scale deployment cloud-orchestrator --replicas=2 -n ai-employee
#
# 7. Health check
#    kubectl port-forward service/cloud-orchestrator-service 8080:8080 -n ai-employee
#    curl http://localhost:8080/health
#
# 8. Delete deployment
#    kubectl delete -f deployment.yaml -n ai-employee
#
# ============================================
